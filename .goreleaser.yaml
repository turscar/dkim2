# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: dkim2

metadata:
  maintainers:
    - "Steve Atkins <steve@wordtothewise.com>"
  license: "BSD-2-Clause"
  description: "Tools to work with DKIM2 email authentication"

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
#    - go generate ./...
    - rm -rf dist
builds:
  - main: ./cmd/...
    env:
      - CGO_ENABLED=0
    ldflags: -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser'
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - arm64
      - amd64

notarize:
  macos_native:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
#      ids:
#        - dkim2verify
#        - dkim2explain
#        - dkim2sign
#        - dkim2
#        - ie.turscar.dist2
      use: pkg
      sign:
        keychain: "{{ .Env.KEYCHAIN_PATH }}"
        identity: "Developer ID Installer: Turscar LTD"
      notarize:
        profile_name: "{{ .Env.MACOS_NOTARY_PROFILE_NAME }}"
        wait: true
#  macos:
#    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
#      ids:
#        - dkim2verify
#        - dkim2explain
#        - dkim2sign
#      sign:
#        certificate: "{{.Env.MACOS_SIGN_P12}}"
#        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
#      notarize:
#        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
#        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
#        key: "{{.Env.MACOS_NOTARY_KEY}}"
#        wait: true
#        timeout: 20m

pkgs:
  - name: 'dkim2{{ if ne .Arch "all" }}-{{.Arch}}{{ end }}'
    id: dkim2
    ids:
      - dkim2verify
      - dkim2explain
      - dkim2sign
    use: binary
    identifier: ie.turscar.dist2
    install_location: /usr/local/bin
    replace: true
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
